name: Build and Deploy Hajj and Umrah Guide

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install React application dependencies
        working-directory: original-react-source
        run: npm install --no-audit --no-fund

      - name: Build React application
        working-directory: original-react-source
        run: npm run build -- --base=/hajj-umrah-3d-guide/react-app/

      - name: Prepare combined static website
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _site
          mkdir -p _site/react-app

          # Keep the latest accurate V15 static website at the main Pages URL.
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='_site/' \
            --exclude='original-react-source/' \
            --exclude='node_modules/' \
            --exclude='*.zip' \
            ./ _site/

          # Publish the complete React/Vite build separately for continuous preview.
          cp -a original-react-source/dist/. _site/react-app/

          # Prevent GitHub Pages from applying Jekyll processing.
          touch _site/.nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
